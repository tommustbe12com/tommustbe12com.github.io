<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Editor</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }
  .editor-container {
    display: flex;
    height: 100vh;
  }
  .editor-pane {
    flex: 1;
    overflow: auto;
    padding: 10px;
    background-color: #f8f8f8;
  }
  .editor {
    width: 100%;
    min-height: 100%;
    border: none;
    outline: none;
    font-family: 'Courier New', Courier, monospace;
  }
  .preview-pane {
    flex: 1;
    overflow: auto;
    padding: 10px;
    background-color: #fff;
    border-left: 1px solid #ddd;
  }
  .preview {
    width: 100%;
    min-height: 100%;
    border: none;
    outline: none;
  }
</style>
</head>
<body>

<div class="editor-container">
  <div class="editor-pane">
    <textarea id="editor" class="editor" placeholder="Write your HTML code here..."></textarea>
  </div>
  <div class="preview-pane">
    <iframe id="preview" class="preview"></iframe>
  </div>
</div>

<script>
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');

  editor.addEventListener('input', updatePreview);

  function updatePreview() {
    const html = editor.value;
    preview.srcdoc = html;
  }

  function formatCode() {
    const unformattedCode = editor.value;
    const formattedCode = html_beautify(unformattedCode);
    editor.value = formattedCode;
    updatePreview();
  }

  // Source: https://beautifier.io/
  function html_beautify(html_source, indent_size = 2, indent_character = ' ') {
    let tab = indent_character.repeat(indent_size);
    let indent_level = 0;
    let output = '';
    let in_tag = false;
    let single_token = '';
    html_source.split(/>\s*</).forEach(function (element) {
      if (element.match(/^\/\w/)) {
        indent_level--;
      }
      if (in_tag) {
        output += tab.repeat(indent_level) + single_token;
        if (element.match(/^\/\w/)) {
          indent_level--;
          output += element;
          in_tag = false;
        } else if (element.match(/^(\w|!)/)) {
          output += '\n' + tab.repeat(++indent_level) + element;
        } else {
          output += element;
        }
      } else {
        if (element.match(/^(\w|!)/)) {
          output += tab.repeat(indent_level) + element;
          in_tag = true;
          single_token = element;
        } else if (element.match(/^\/\w/)) {
          output += '\n' + tab.repeat(--indent_level) + element;
        } else {
          output += '\n' + tab.repeat(indent_level) + element;
        }
      }
    });
    return output;
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Browser</title>
        <style>
            .navigator {
                background-color: #5e5e5e;
                padding: 25px;
            }

            .browser {
                background-color: #282828;
                padding: 20px;
            }

            .urlInput {
                width: 80%;
            }

            body {
                font-family: Arial;
                background: #282828;
            }

            input {
                border-radius: 2.5px;
                border: 1px black solid;
                padding: 10px;
            }

            .browsercontent {
                width: 100%;
                height: 100vh;
            }

            button {
                background-color: #F1F1F1;
                border: none;
                padding: 10px;
            }
        </style>
    </head>
    <body>
        <div class="navigator">
            <input type="text" width=80% id="urlInput" class="urlInput"> <button onclick="showUrl()">Go</button>
        </div>
        <div class="browser">
            <iframe class="browsercontent" id="browsercontent" src="/browserstart.html">

            </iframe>
        </div>
        <script>
            function showUrl() {
                var inputUrl = document.getElementById('urlInput').value;

                if (!inputUrl.startsWith('https://') && !inputUrl.startsWith('http://')) {
                    inputUrl = 'https://' + inputUrl;
                }

                var urlObject = new URL(inputUrl);

                if (urlObject) {
                    document.getElementById('browsercontent').src=inputUrl;
                } else {
                    document.getElementById('browsercontent').innerHTML = '<p class="error">Invalid URL</p>';
                }
            }
        </script>
    </body>
</html>

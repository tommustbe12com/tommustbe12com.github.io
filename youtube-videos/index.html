<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomMustBe12 Video Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1em;
        }

        #videos-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding: 20px;
        }

        .video-card {
            width: 400px;
            margin: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            border-radius: 8px;
            transition: transform 0.3s ease-in-out;
        }

        .video-card:hover {
            transform: scale(1.05);
        }

        iframe {
            width: 100%;
            height: 225px;
            border: none;
            border-radius: 8px 8px 0 0;
        }

        .video-details {
            padding: 15px;
            background-color: #fff;
            border-radius: 0 0 8px 8px;
        }

        h2 {
            margin-top: 0;
            font-size: 18px;
            color: #333;
        }

        #load-more {
            display: block;
            margin: 20px auto;
            /* Center the button horizontally with top and bottom margins */
            padding: 20px 30px;
            font-size: 16px;
            background-color: rgb(36, 59, 188);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #load-more:hover {
            background-color: rgb(19, 37, 156);
        }

        .center {
            margin: 0 auto;
        }

        #back-button {
            display: block;
            margin: 20px auto;
            /* Center the button horizontally with top and bottom margins */
            padding: 10px 20px;
            font-size: 16px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #back-button:hover {
            background-color: #555;
        }
    </style>


</head>

<body>
    <header>
        <h1>TomMustBe12's Videos</h1>
    </header>

    <div id="videos-container"></div>
    <div class="center">
        <button id="load-more">Load More</button>
    </div>
    <div class="center">
        <button id="back-button" onclick="window.location.href='../index.html'">Back to Homepage</button>
    </div>
    </div>

    <script>
        const videosContainer = document.getElementById('videos-container');
        const loadMoreButton = document.getElementById('load-more');
        let allVideos = [];
        let startIndex = 0;
        const batchSize = 6; // Number of videos per batch

        async function fetchVideos() {
            try {
                const response = await fetch('https://tmb12.link/youtube/latest');
                allVideos = await response.json();

                // Initial batch
                renderVideos();
            } catch (error) {
                console.error('Error fetching YouTube videos:', error);
                videosContainer.innerHTML = '<p>Failed to load videos</p>';
            }
        }

        function renderVideos() {
            const endIndex = Math.min(startIndex + batchSize, allVideos.length);

            for (let i = startIndex; i < endIndex; i++) {
                const video = allVideos[i];

                const videoCard = document.createElement('a');
                videoCard.className = 'video-card panel';
                videoCard.href = video.link;
                videoCard.target = '_blank';
                videoCard.innerHTML = `
            <img src="${video.thumbnail}" alt="${video.title}" class="video-thumbnail">
            <h3>${video.title}</h3>
            `;

                videosContainer.appendChild(videoCard);
            }

            startIndex = endIndex;

            if (startIndex >= allVideos.length) {
                loadMoreButton.style.display = 'none';
            }
        }

        // Load more button
        loadMoreButton.addEventListener('click', renderVideos);

        // Initial load
        fetchVideos();
    </script>
    <script async src="https://countxr.tommustbe12.com/api/track.js" data-site-id="13fcf6611f6ccf56"></script>
</body>

</html>
